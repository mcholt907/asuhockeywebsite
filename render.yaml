# ASU Hockey Website - Render.com Deployment Configuration

services:
  # Backend + Frontend Server
  - type: web
    name: asuhockey
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx puppeteer browsers install chrome && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/puppeteer
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CORS_ORIGINS
        sync: false # Set this in Render dashboard to your custom domain
    healthCheckPath: /healthz
